name: CD - Deploy to Dev

on:
  push:
    branches:
      - staging

jobs:
  deploy-dev:
    name: Deploy to Dev EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEV_SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.DEV_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts

      - name: Deploy to Dev Server
        env:
          SSH_HOST: ${{ secrets.DEV_HOST }}
          SSH_USER: ${{ secrets.DEV_USER }}
        run: |
          ssh -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST << 'ENDSSH'
            set -e

            echo "🚀 Starting deployment to dev environment..."

            # Navigate to project directory
            cd /opt/datapulse

            # Pull latest changes
            echo "📥 Pulling latest code from staging branch..."
            git fetch origin
            git checkout staging
            git pull origin staging

            # Refresh .env from SSM (EC2 has IAM role for Parameter Store)
            if [ -f scripts/refresh-env.sh ]; then
              echo "🔧 Refreshing environment from SSM..."
              export AWS_REGION="${AWS_REGION:-eu-west-1}"
              export SSM_PREFIX="${SSM_PREFIX:-/datapulse/dev}"
              source scripts/refresh-env.sh || true
            fi

            # Stop running containers
            echo "🛑 Stopping existing containers..."
            docker compose --profile all down

            # Pull latest images (if using registry)
            echo "📦 Pulling Docker images..."
            docker compose --profile all pull || true

            # Rebuild images
            docker compose --profile all up -d --build --force-recreate

            # Wait for services to be healthy
            echo "⏳ Waiting for services to be healthy..."
            sleep 10

            # Check container status
            echo "✅ Container status:"
            docker compose ps

            # Clean up old images
            echo "🧹 Cleaning up old Docker images..."
            docker image prune -f

            echo "✨ Deployment completed successfully!"
          ENDSSH

      - name: Verify Deployment
        env:
          SSH_HOST: ${{ secrets.DEV_HOST }}
          SSH_USER: ${{ secrets.DEV_USER }}
        run: |
          ssh -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST << 'ENDSSH'
            echo "🔍 Verifying deployment..."
            cd /opt/datapulse

            # Backend (Django) — /health/ with trailing slash
            curl -sf http://localhost:8000/health/ > /dev/null && echo "✅ Backend OK" || echo "⚠️ Backend health check failed"

            # Frontend (Next.js on 3001)
            curl -sf http://localhost:3001/ > /dev/null && echo "✅ Frontend OK" || echo "⚠️ Frontend check failed"

            # Streamlit
            curl -sf http://localhost:8501/ > /dev/null && echo "✅ Streamlit OK" || echo "⚠️ Streamlit check failed"

            docker compose ps
            echo "✅ Verification complete"
          ENDSSH

      - name: Notify Deployment Status
        if: always()
        run: |
          if [ ${{ job.status }} == 'success' ]; then
            echo "✅ Deployment to dev environment succeeded"
          else
            echo "❌ Deployment to dev environment failed"
          fi
