name: Auto Assign Reviewer

on:
  pull_request:
    types: [opened, ready_for_review]

permissions:
  pull-requests: write

jobs:
  assign:
    name: Assign Reviewer
    runs-on: ubuntu-latest
    steps:
      - name: Assign reviewer based on author
        uses: actions/github-script@v7
        with:
          script: |
            const author = context.payload.pull_request.user.login;

            const reviewerMap = {
              "lubandi": "JoeBright1619",
              "IshimweDiane": "lubandi",
              "JoeBright1619": "IshimweDiane",
              "Kalisha1234": "tob-amalitech",
              "Zaina-M": "Damas200",
              "Asheryram": "Benjamin-yankey"
            };

            const reviewer = reviewerMap[author] || "Asheryram";

            if (reviewer) {
              try {
                await github.rest.pulls.requestReviewers({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: context.payload.pull_request.number,
                  reviewers: [reviewer]
                });
                console.log(`Assigned @${reviewer} to review @${author}'s PR`);
              } catch (error) {
                console.log(`Could not assign ${reviewer}: ${error.message}`);
              }
            } else {
              console.log(`No reviewer mapped for @${author} - assign manually`);
            }
