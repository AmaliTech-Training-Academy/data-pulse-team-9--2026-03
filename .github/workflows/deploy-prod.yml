name: Deploy — Prod

# Triggers when develop is merged into main
on:
  push:
    branches: [main]

concurrency:
  group: deploy-prod
  cancel-in-progress: false   # never kill a running prod deploy

env:
  AWS_REGION: eu-west-1
  ECS_CLUSTER: datapulse-prod
  CODEDEPLOY_APP: datapulse-prod

jobs:
  deploy:
    name: Build, Push & Canary Deploy
    runs-on: ubuntu-latest
    if: startsWith(github.event.head_commit.message, 'Merge pull request')

    environment:
      name: prod
      url: https://${{ vars.DOMAIN_NAME }}

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      # ── AWS auth via OIDC ─────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.PROD_AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Build and push all images tagged with git SHA ─────────────────
      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/datapulse-backend:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/datapulse-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push ETL
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./devops/Dockerfile.pipeline
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/datapulse-etl:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/datapulse-etl:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Streamlit
        uses: docker/build-push-action@v5
        with:
          context: ./data-engineering
          file: ./data-engineering/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/datapulse-streamlit:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/datapulse-streamlit:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Register new ECS task definitions ────────────────────────────
      # CodeDeploy needs a task def ARN — we register new revisions
      # with the new image SHA before triggering the deployment.

      - name: Register new backend task definition
        id: register-backend-td
        run: |
          # Get current task def, swap image tag to new SHA
          CURRENT=$(aws ecs describe-task-definition \
            --task-definition datapulse-prod-backend \
            --query "taskDefinition" --output json)

          NEW=$(echo $CURRENT | jq \
            --arg IMAGE "${{ steps.ecr-login.outputs.registry }}/datapulse-backend:${{ github.sha }}" \
            '.containerDefinitions[0].image = $IMAGE |
             del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                 .compatibilities, .registeredAt, .registeredBy)')

          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW" \
            --query "taskDefinition.taskDefinitionArn" \
            --output text)

          echo "arn=$NEW_ARN" >> $GITHUB_OUTPUT
          echo "→ Registered $NEW_ARN"

      - name: Register new streamlit task definition
        id: register-streamlit-td
        run: |
          CURRENT=$(aws ecs describe-task-definition \
            --task-definition datapulse-prod-streamlit \
            --query "taskDefinition" --output json)

          NEW=$(echo $CURRENT | jq \
            --arg IMAGE "${{ steps.ecr-login.outputs.registry }}/datapulse-streamlit:${{ github.sha }}" \
            '.containerDefinitions[0].image = $IMAGE |
             del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                 .compatibilities, .registeredAt, .registeredBy)')

          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW" \
            --query "taskDefinition.taskDefinitionArn" \
            --output text)

          echo "arn=$NEW_ARN" >> $GITHUB_OUTPUT

      # ── Deploy celery services directly (no traffic shifting needed) ──
      # Celery worker and beat don't sit behind the ALB so they don't
      # need blue/green — rolling restart is fine for them.
      - name: Deploy celery-worker (rolling)
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service datapulse-prod-celery-worker \
            --task-definition datapulse-prod-celery-worker \
            --force-new-deployment \
            --no-cli-pager

      - name: Deploy celery-beat (rolling)
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service datapulse-prod-celery-beat \
            --task-definition datapulse-prod-celery-beat \
            --force-new-deployment \
            --no-cli-pager

      # ── Fetch hook ARNs from SSM (set by Terraform) ───────────────────
      - name: Get hook Lambda ARNs
        id: hooks
        run: |
          SMOKE=$(aws ssm get-parameter \
            --name "/datapulse/prod/hook_smoke_test_arn" \
            --query "Parameter.Value" --output text)
          CANARY=$(aws ssm get-parameter \
            --name "/datapulse/prod/hook_canary_50_arn" \
            --query "Parameter.Value" --output text)
          echo "smoke_arn=$SMOKE" >> $GITHUB_OUTPUT
          echo "canary_arn=$CANARY" >> $GITHUB_OUTPUT

      # ── Generate appspec.json for backend CodeDeploy deployment ───────
      - name: Generate backend appspec.json
        run: |
          cat > appspec-backend.json << EOF
          {
            "version": 1,
            "Resources": [{
              "TargetService": {
                "Type": "AWS::ECS::Service",
                "Properties": {
                  "TaskDefinition": "${{ steps.register-backend-td.outputs.arn }}",
                  "LoadBalancerInfo": {
                    "ContainerName": "backend",
                    "ContainerPort": 8000
                  }
                }
              }
            }],
            "Hooks": [
              {
                "AfterAllowTestTraffic": "${{ steps.hooks.outputs.smoke_arn }}"
              },
              {
                "BeforeAllowTraffic": "${{ steps.hooks.outputs.canary_arn }}"
              }
            ]
          }
          EOF

      # ── Trigger backend CodeDeploy canary deployment ──────────────────
      - name: Start backend canary deployment
        id: deploy-backend
        run: |
          DEPLOYMENT_ID=$(aws deploy create-deployment \
            --application-name $CODEDEPLOY_APP \
            --deployment-group-name datapulse-prod-backend \
            --revision '{"revisionType":"AppSpecContent","appSpecContent":{"content":"'"$(cat appspec-backend.json | jq -c . | sed "s/'/\\\\'/g")"'"}}' \
            --description "Deploy ${{ github.sha }}" \
            --query "deploymentId" \
            --output text)

          echo "deployment_id=$DEPLOYMENT_ID" >> $GITHUB_OUTPUT
          echo "→ Started deployment: $DEPLOYMENT_ID"

      # ── Generate and trigger streamlit deployment ─────────────────────
      - name: Generate streamlit appspec.json
        run: |
          cat > appspec-streamlit.json << EOF
          {
            "version": 1,
            "Resources": [{
              "TargetService": {
                "Type": "AWS::ECS::Service",
                "Properties": {
                  "TaskDefinition": "${{ steps.register-streamlit-td.outputs.arn }}",
                  "LoadBalancerInfo": {
                    "ContainerName": "streamlit",
                    "ContainerPort": 8501
                  }
                }
              }
            }],
            "Hooks": [
              {
                "AfterAllowTestTraffic": "${{ steps.hooks.outputs.smoke_arn }}"
              },
              {
                "BeforeAllowTraffic": "${{ steps.hooks.outputs.canary_arn }}"
              }
            ]
          }
          EOF

      - name: Start streamlit canary deployment
        id: deploy-streamlit
        run: |
          DEPLOYMENT_ID=$(aws deploy create-deployment \
            --application-name $CODEDEPLOY_APP \
            --deployment-group-name datapulse-prod-streamlit \
            --revision '{"revisionType":"AppSpecContent","appSpecContent":{"content":"'"$(cat appspec-streamlit.json | jq -c . | sed "s/'/\\\\'/g")"'"}}' \
            --description "Deploy ${{ github.sha }}" \
            --query "deploymentId" \
            --output text)

          echo "deployment_id=$DEPLOYMENT_ID" >> $GITHUB_OUTPUT

      # ── Wait for backend deployment to complete ───────────────────────
      - name: Wait for backend deployment
        run: |
          echo "→ Waiting for backend deployment ${{ steps.deploy-backend.outputs.deployment_id }}..."
          echo "  Traffic shift: 10% (5min) → 50% (10min) → 100%"

          aws deploy wait deployment-successful \
            --deployment-id ${{ steps.deploy-backend.outputs.deployment_id }}

          echo "✓ Backend canary deployment complete"

      # ── Final smoke test on 100% green ────────────────────────────────
      - name: Final smoke test
        run: |
          for i in {1..10}; do
            if curl -sf --max-time 15 https://${{ vars.DOMAIN_NAME }}/health/; then
              echo "✓ Final smoke test passed"
              exit 0
            fi
            echo "Attempt $i/10 — retrying in 15s..."
            sleep 15
          done
          echo "✗ Final smoke test failed"
          exit 1

      # ── Stop deployment and rollback if anything fails ────────────────
      - name: Stop deployment on failure
        if: failure()
        run: |
          DEPLOYMENT_ID="${{ steps.deploy-backend.outputs.deployment_id }}"
          if [ -n "$DEPLOYMENT_ID" ]; then
            echo "→ Stopping deployment $DEPLOYMENT_ID..."
            aws deploy stop-deployment \
              --deployment-id $DEPLOYMENT_ID \
              --auto-rollback-enabled || true
            echo "✓ Rollback triggered — blue environment remains live"
          fi

      - name: Write deploy summary
        if: always()
        run: |
          STATUS="${{ job.status }}"
          ICON=$([[ "$STATUS" == "success" ]] && echo "✓" || echo "✗")
          SHA="${{ github.sha }}"
          echo "## $ICON Prod Canary Deploy — $STATUS" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${SHA:0:7}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Merged by:** @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Traffic shift sequence" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Traffic to green | Bake time |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----------------|-----------|" >> $GITHUB_STEP_SUMMARY
          echo "| 1 | 10% | 5 minutes |" >> $GITHUB_STEP_SUMMARY
          echo "| 2 | 50% | 10 minutes |" >> $GITHUB_STEP_SUMMARY
          echo "| 3 | 100% | — |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Backend deployment:** \`${{ steps.deploy-backend.outputs.deployment_id }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** https://${{ vars.DOMAIN_NAME }}" >> $GITHUB_STEP_SUMMARY
          if [ "$STATUS" != "success" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo " Deployment stopped — blue environment was never taken offline." >> $GITHUB_STEP_SUMMARY
          fi
