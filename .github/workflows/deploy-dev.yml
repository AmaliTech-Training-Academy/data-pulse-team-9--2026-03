name: Deploy — Dev

# Triggers when a PR is merged into develop
# (push event only fires on actual merges, not on PR commits)
on:
  push:
    branches: [develop]

# Never cancel a running deploy — let it finish
concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Dev EC2
    runs-on: ubuntu-latest

    # Only deploy on actual merges, not direct pushes.
    # github.event.head_commit.message contains "Merge pull request"
    # when the push was created by a PR merge.
    if: startsWith(github.event.head_commit.message, 'Merge pull request')

    environment:
      name: dev
      url: http://${{ vars.DEV_HOST }}:8000

    steps:
      - uses: actions/checkout@v4

      # ── Ensure instance is running ────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.DEV_AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Start instance if stopped
        run: |
          INSTANCE_ID=$(aws ssm get-parameter \
            --name "/datapulse/dev/scheduler/instance_id" \
            --query "Parameter.Value" --output text)

          STATE=$(aws ec2 describe-instances \
            --instance-ids $INSTANCE_ID \
            --query "Reservations[0].Instances[0].State.Name" \
            --output text)

          echo "Instance $INSTANCE_ID is: $STATE"

          if [ "$STATE" == "stopped" ]; then
            echo "→ Starting instance..."
            aws ec2 start-instances --instance-ids $INSTANCE_ID
            aws ec2 wait instance-running --instance-ids $INSTANCE_ID
            echo "→ Giving services 30s to boot..."
            sleep 30
          elif [ "$STATE" == "stopping" ]; then
            echo "→ Waiting for stop to complete before starting..."
            aws ec2 wait instance-stopped --instance-ids $INSTANCE_ID
            aws ec2 start-instances --instance-ids $INSTANCE_ID
            aws ec2 wait instance-running --instance-ids $INSTANCE_ID
            sleep 30
          fi

      # ── SSH deploy ────────────────────────────────────────────────────
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.DEV_HOST }}
          username: ec2-user
          key: ${{ secrets.DEV_SSH_PRIVATE_KEY }}
          timeout: 180s
          script: |
            set -euo pipefail
            cd /opt/datapulse

            echo "→ Pulling ${{ github.sha }}..."
            git fetch origin develop
            git reset --hard ${{ github.sha }}

            echo "→ Rebuilding changed images..."
            docker compose build --pull

            echo "→ Running migrations..."
            docker compose run --rm --no-deps backend \
              python manage.py migrate --noinput

            echo "→ Restarting stack..."
            docker compose up -d --remove-orphans

            echo "→ Pruning old images..."
            docker image prune -f

            echo "✓ Deployed $(git log -1 --oneline)"

      # ── Smoke test ────────────────────────────────────────────────────
      - name: Smoke test
        run: |
          echo "→ Waiting for health check..."
          for i in {1..12}; do
            if curl -sf --max-time 10 http://${{ vars.DEV_HOST }}:8000/health/; then
              echo "✓ Health check passed"
              exit 0
            fi
            echo "Attempt $i/12 — retrying in 10s..."
            sleep 10
          done
          echo "✗ Health check failed after 120s"
          exit 1

      - name: Write deploy summary
        if: always()
        run: |
          STATUS="${{ job.status }}"
          ICON=$([[ "$STATUS" == "success" ]] && echo "✓" || echo "✗")
          echo "## $ICON Dev Deploy — $STATUS" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Merged by:** @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | http://${{ vars.DEV_HOST }}:8000 |" >> $GITHUB_STEP_SUMMARY
          echo "| Streamlit | http://${{ vars.DEV_HOST }}:8501 |" >> $GITHUB_STEP_SUMMARY
          echo "| Grafana | http://${{ vars.DEV_HOST }}:3000 |" >> $GITHUB_STEP_SUMMARY
