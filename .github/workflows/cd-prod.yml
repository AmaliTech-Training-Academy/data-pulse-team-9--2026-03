name: CD - Deploy to Production ECS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: eu-west-1
  ECR_REGISTRY: 970547336735.dkr.ecr.eu-west-1.amazonaws.com

jobs:
  deploy-production:
    name: Deploy to Production ECS
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Backend image to ECR
        env:
          ECR_REPOSITORY: datapulse-backend
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "🔨 Building backend Docker image..."
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./backend
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest

          echo "📤 Pushing backend image to ECR..."
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

          echo "✅ Backend image pushed successfully"

      - name: Build, tag, and push ETL image to ECR
        env:
          ECR_REPOSITORY: datapulse-etl
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "🔨 Building ETL Docker image..."
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./data-engineering
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest

          echo "📤 Pushing ETL image to ECR..."
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

          echo "✅ ETL image pushed successfully"

      - name: Build, tag, and push Streamlit image to ECR
        env:
          ECR_REPOSITORY: datapulse-streamlit
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "🔨 Building Streamlit Docker image..."
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./data-engineering
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest

          echo "📤 Pushing Streamlit image to ECR..."
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

          echo "✅ Streamlit image pushed successfully"

      - name: Update ECS Backend Service
        run: |
          echo "🔄 Updating ECS backend service..."
          aws ecs update-service \
            --cluster datapulse-prod \
            --service datapulse-prod-backend \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

          echo "✅ Backend service update initiated"

      - name: Update ECS Celery Worker Service
        run: |
          echo "🔄 Updating ECS celery-worker service..."
          aws ecs update-service \
            --cluster datapulse-prod \
            --service datapulse-prod-celery-worker \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

          echo "✅ Celery worker service update initiated"

      - name: Update ECS Celery Beat Service
        run: |
          echo "🔄 Updating ECS celery-beat service..."
          aws ecs update-service \
            --cluster datapulse-prod \
            --service datapulse-prod-celery-beat \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

          echo "✅ Celery beat service update initiated"

      - name: Update ECS Streamlit Service
        run: |
          echo "🔄 Updating ECS streamlit service..."
          aws ecs update-service \
            --cluster datapulse-prod \
            --service datapulse-prod-streamlit \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

          echo "✅ Streamlit service update initiated"

      - name: Wait for services to stabilize
        run: |
          echo "⏳ Waiting for services to stabilize..."

          services=(
            "datapulse-prod-backend"
            "datapulse-prod-celery-worker"
            "datapulse-prod-celery-beat"
            "datapulse-prod-streamlit"
          )

          for service in "${services[@]}"; do
            echo "Waiting for $service..."
            aws ecs wait services-stable \
              --cluster datapulse-prod \
              --services $service \
              --region ${{ env.AWS_REGION }} || echo "⚠️  $service did not stabilize in time"
          done

          echo "✅ All services deployment complete"

      - name: Verify Deployment
        run: |
          echo "🔍 Verifying deployment..."

          # Get ALB DNS name
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --names datapulse-prod \
            --query 'LoadBalancers[0].DNSName' \
            --output text \
            --region ${{ env.AWS_REGION }})

          echo "ALB DNS: $ALB_DNS"

          # Check backend health
          echo "Checking backend health..."
          curl -f http://$ALB_DNS/health || echo "⚠️  Backend health check failed"

          # Check backend API
          echo "Checking backend API..."
          curl -f http://$ALB_DNS/api/ || echo "⚠️  Backend API check failed"

          echo "✅ Deployment verification complete"

      - name: Notify Deployment Status
        if: always()
        run: |
          if [ ${{ job.status }} == 'success' ]; then
            echo "✅ Production deployment succeeded"
            echo "🚀 Services updated with image tag: ${{ github.sha }}"
            echo "🌐 Application URL: http://datapulse-prod-1543503060.eu-west-1.elb.amazonaws.com"
          else
            echo "❌ Production deployment failed"
          fi

      - name: Create deployment summary
        if: always()
        run: |
          echo "## 🚀 Production Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** main" >> $GITHUB_STEP_SUMMARY
          echo "**Region:** ${{ env.AWS_REGION }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Services Updated:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Backend (datapulse-prod-backend)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Celery Worker (datapulse-prod-celery-worker)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Celery Beat (datapulse-prod-celery-beat)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Streamlit (datapulse-prod-streamlit)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### URLs:" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend API:** http://datapulse-prod-1543503060.eu-west-1.elb.amazonaws.com/api/" >> $GITHUB_STEP_SUMMARY
          echo "- **Streamlit:** http://datapulse-prod-1543503060.eu-west-1.elb.amazonaws.com/streamlit" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend:** https://main.d6itqrswflsj6.amplifyapp.com" >> $GITHUB_STEP_SUMMARY
