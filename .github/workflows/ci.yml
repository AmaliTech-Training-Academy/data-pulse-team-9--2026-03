name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 0 * * 0'  # Weekly security scans on Sunday

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    name: Pre-commit Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - uses: pre-commit/action@v3.0.1

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: pre-commit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt   #  cache pip by lockfile
      - name: Install linters
        run: pip install flake8 black isort
      - name: Run black
        run: black --check backend/
      - name: Run isort
        run: isort --check-only backend/
      - name: Run flake8
        run: flake8 backend/

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: datapulse_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test_user -d datapulse_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt   # CHANGE 2: cache pip by lockfile
      - name: Install dependencies
        run: pip install -r backend/requirements.txt pytest-cov
      - name: Run migrations
        env:
          DATABASE_URL: postgresql://test_user:${{ secrets.CI_POSTGRES_PASSWORD }}@localhost:5432/datapulse_test
          SECRET_KEY: ${{ secrets.CI_SECRET_KEY }}
          DJANGO_SETTINGS_MODULE: datapulse.settings.dev
          DEBUG: "True"
        run: cd backend && python manage.py migrate --noinput
      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql://test_user:${{ secrets.CI_POSTGRES_PASSWORD }}@localhost:5432/datapulse_test
          SECRET_KEY: ${{ secrets.CI_SECRET_KEY }}
          DJANGO_SETTINGS_MODULE: datapulse.settings.dev
          DEBUG: "True"
        run: |
          cd backend && pytest tests/ -v \
            --tb=short \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=75 \
            --ignore=backendv1
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage.xml

  # ── Frontend pipeline ─────────────────────────────────────────────────────


  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Run ESLint
        run: cd frontend && npm run lint
      - name: Run Prettier check
        run: cd frontend && npm run format:check

  frontend-test:
    name: Frontend Test
    runs-on: ubuntu-latest
    needs: frontend-lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Run tests with coverage
        run: cd frontend && npm run test:coverage -- --coverage.thresholds.lines=75
      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage-report
          path: frontend/coverage/

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: frontend-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Build
        run: cd frontend && npm run build
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/

  # ── Security jobs (run in parallel with/after lint) ──────────────────────

  trivy:
    name: Trivy - Container & Secrets Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner in repo mode
        # CHANGE 4: pinned from @master to a specific SHA
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947b394f2dd8c87dbb0  # v0.29.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
      - name: Run Trivy on Dockerfile
        # CHANGE 4: pinned from @master to a specific SHA
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947b394f2dd8c87dbb0  # v0.29.0
        with:
          scan-type: 'config'
          scan-ref: './backend/Dockerfile'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

  bandit:
    name: Bandit - Python Security
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Bandit
        run: pip install bandit[toml]
      - name: Run Bandit scan (JSON report)
        run: |
          bandit -r backend/ \
            -f json \
            -o bandit-report.json \
            --severity-level medium \
            --confidence-level medium \
            --exclude backend/tests/,backend/migrations/ \
            || true
      - name: Show Bandit results
        run: |
          bandit -r backend/ \
            -f screen \
            --severity-level medium \
            --confidence-level medium \
            --exclude backend/tests/,backend/migrations/
      # fail the build on any HIGH-severity Bandit findings
      - name: Fail on high-severity findings
        run: |
          python - <<'EOF'
          import json, sys
          with open("bandit-report.json") as f:
              report = json.load(f)
          high = [
              r for r in report.get("results", [])
              if r["issue_severity"] == "HIGH"
          ]
          if high:
              print(f" {len(high)} HIGH-severity Bandit finding(s):")
              for r in high:
                  print(f"  [{r['test_id']}] {r['issue_text']} — {r['filename']}:{r['line_number']}")
              sys.exit(1)
          print("✓ No HIGH-severity findings")
          EOF
      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

  safety:
    name: Safety - Dependency Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Safety
        run: pip install safety
      - name: Run Safety check
        run: |
          safety check \
            -r backend/requirements.txt \
            --json \
            --output safety-report.json \
            --continue-on-error || true
      - name: Show Safety results
        run: |
          safety check \
            -r backend/requirements.txt \
            --full-report \
            --continue-on-error
      - name: Upload Safety report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: safety-report
          path: safety-report.json
  gitleaks:
    name: Gitleaks - Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Gitleaks
        run: |
          wget -qO- https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/
      - name: Run Gitleaks
        run: gitleaks detect --source . --log-opts="origin/HEAD..HEAD" -v

  codeql:
    name: CodeQL - SAST Analysis
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-and-quality
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"

  # ── Build & Integration (gate on test + security) ────────────────────────

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test, trivy, bandit, safety, gitleaks, codeql]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: datapulse-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Create environment file
        run: |
          cat > .env << EOF
          POSTGRES_DB=datapulse
          POSTGRES_USER=datapulse
          POSTGRES_PASSWORD=${{ secrets.CI_POSTGRES_PASSWORD }}
          DATABASE_URL=postgresql://datapulse:${{ secrets.CI_POSTGRES_PASSWORD }}@db:5432/datapulse
          ANALYTICS_DB=datapulse_analytics
          ANALYTICS_USER=analytics
          ANALYTICS_PASSWORD=${{ secrets.CI_ANALYTICS_PASSWORD }}
          TARGET_DB_URL=postgresql://analytics:${{ secrets.CI_ANALYTICS_PASSWORD }}@db-analytics:5432/datapulse_analytics
          SECRET_KEY=${{ secrets.CI_SECRET_KEY }}
          DJANGO_SETTINGS_MODULE=datapulse.settings.dev
          DEBUG=True
          ACCESS_TOKEN_EXPIRE_MINUTES=1440
          GRAFANA_USER=admin
          GRAFANA_PASSWORD=${{ secrets.CI_GRAFANA_PASSWORD }}
          EOF
      - name: Start services
        run: docker compose up -d --build
      - name: Wait for backend health
        run: |
          echo "Waiting for backend..."
          for i in {1..30}; do
            if curl -sf http://localhost:8000/health/; then
              echo "Backend is healthy"
              break
            fi
            echo "Attempt $i/30 - retrying in 5s..."
            sleep 5
          done
      - name: Run smoke tests
        run: |
          curl -sf http://localhost:8000/health/
          echo "✓ Health check passed"
          curl -sf http://localhost:8000/api/schema/swagger-ui/ > /dev/null
          echo "✓ Swagger UI accessible"
      - name: Show logs on failure
        if: failure()
        run: |
          echo "=== Backend Logs ==="
          docker compose logs backend
          echo "=== Database Logs ==="
          docker compose logs db
      - name: Cleanup
        if: always()
        run: docker compose down -v


  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [integration, trivy, bandit, safety, gitleaks, codeql]
    if: always()
    steps:
      - name: Write summary
        run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Security Scans" >> $GITHUB_STEP_SUMMARY
          echo "- Trivy: Container & secrets scan (pinned SHA)" >> $GITHUB_STEP_SUMMARY
          echo "- Bandit: Python security scan (blocks on HIGH)" >> $GITHUB_STEP_SUMMARY
          echo "- Safety: Dependency check" >> $GITHUB_STEP_SUMMARY
          echo "- Gitleaks: Secret detection (pinned SHA)" >> $GITHUB_STEP_SUMMARY
          echo "- CodeQL: SAST analysis" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pipeline" >> $GITHUB_STEP_SUMMARY
          echo "- Pre-commit → Lint → Test (≥75% cov) → Build → Integration → Deploy (main only)" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: Lint → Test → Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check individual job results for details." >> $GITHUB_STEP_SUMMARY
