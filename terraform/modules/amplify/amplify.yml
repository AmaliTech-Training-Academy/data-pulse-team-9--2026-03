version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd frontend
        - npm ci --prefer-offline
    build:
      commands:
        - cd frontend
        - npm run build
    postBuild:
      commands:
        - echo "Build complete for $NEXT_PUBLIC_ENVIRONMENT"
  artifacts:
    baseDirectory: frontend/.next
    files:
      - "**/*"
  cache:
    paths:
      - frontend/node_modules/**/*
      - frontend/.next/cache/**/*
  environment:
    variables:
      NODE_OPTIONS: "--max_old_space_size=4096"
test:
  phases:
    preTest:
      commands:
        - cd frontend
        - npm ci --prefer-offline
    test:
      commands:
        - cd frontend
        - npm run test:ci
  artifacts:
    baseDirectory: frontend/coverage
    files:
      - "**/*"
