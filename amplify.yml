version: 1
frontend:
  phases:
    preBuild:
      commands:
        - echo "Installing dependencies..."
        - cd frontend
        - npm ci
    build:
      commands:
        - echo "Building Next.js application..."
        - cd frontend
        - npm run build
        - echo "Build completed successfully"
        - ls -la .next/
  artifacts:
    baseDirectory: frontend
    files:
      - '**/*'
  cache:
    paths:
      - frontend/node_modules/**/*
      - frontend/.next/cache/**/*
