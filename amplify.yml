version: 1
frontend:
  phases:
    preBuild:
      commands:
        - echo " Repository structure:"
        - ls -la
        - echo " Frontend directory:"
        - ls -la frontend/
        - echo " Installing dependencies..."
        - cd frontend
        - npm ci --prefer-offline
        - echo " Fixing vulnerabilities..."
        - npm audit fix --force || echo " Some vulnerabilities couldn't be fixed"

    build:
      commands:
        - echo " Building Next.js application..."
        - cd frontend
        - npm run build
        - echo " Build output:"
        - ls -la out/
        - echo " Sample files:"
        - find out -name "*.html" | head -5

    postBuild:
      commands:
        - echo " Build complete!"
        - echo " Final artifacts in out directory:"
        - cd frontend && ls -la out/

  artifacts:
    baseDirectory: frontend/out
    files:
      - "**/*"

  cache:
    paths:
      - frontend/node_modules/**/*
      - frontend/.next/cache/**/*
