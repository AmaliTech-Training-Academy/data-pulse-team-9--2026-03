# =============================================================
# DataPulse — Docker Compose with profiles
#
# Usage:
#   All services:    docker compose --profile all up -d
#   Backend only:    docker compose --profile backend up -d
#   Frontend only:   docker compose --profile frontend up -d
#   Streamlit only:  docker compose --profile streamlit up -d
#   Monitoring only: docker compose --profile monitoring up -d
#   ETL run:         docker compose --profile etl run --rm etl
#
# REQUIRED: Copy .env.example to .env in this directory before running.
# Core services (db, db-analytics, redis) have no profile tag
# so they always start regardless of which profile is used.
# =============================================================

services:

  # -----------------------------------------------------------
  # Core — no profile, always starts
  # -----------------------------------------------------------
  db:
    image: postgres:15-alpine
    container_name: datapulse-db
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-datapulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-datapulse}
      POSTGRES_DB: ${POSTGRES_DB:-datapulse}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - datapulse-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-datapulse}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  db-analytics:
    image: postgres:15-alpine
    container_name: datapulse-db-analytics
    env_file: .env
    environment:
      POSTGRES_USER: ${ANALYTICS_USER:-analytics}
      POSTGRES_PASSWORD: ${ANALYTICS_PASSWORD:-analytics}
      POSTGRES_DB: ${ANALYTICS_DB:-datapulse_analytics}
    ports:
      - "5433:5432"
    volumes:
      - pgdata_analytics:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - datapulse-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${ANALYTICS_USER:-analytics} -d ${ANALYTICS_DB:-datapulse_analytics}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: datapulse-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - datapulse-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  # -----------------------------------------------------------
  # Profile: backend
  # Django + Gunicorn, Celery worker, Celery beat
  # -----------------------------------------------------------
  backend:
    profiles: [ backend, all ]
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: datapulse-backend
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://datapulse:datapulse@db:5432/datapulse}  # pragma: allowlist secret
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-datapulse.settings.dev}
      DEBUG: ${DEBUG:-True}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
      GUNICORN_THREADS: ${GUNICORN_THREADS:-4}
      GUNICORN_LOG_LEVEL: ${GUNICORN_LOG_LEVEL:-info}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
      EMAIL_HOST: ${EMAIL_HOST:-localhost}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-True}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-noreply@datapulse.com}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - upload_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - datapulse-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health/" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  celery-worker:
    profiles: [ backend, all ]
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: datapulse-celery-worker
    command: celery -A datapulse worker --loglevel=info
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://datapulse:datapulse@db:5432/datapulse}  # pragma: allowlist secret
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-datapulse.settings.dev}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - ./backend:/app
      - upload_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - datapulse-network

  celery-beat:
    profiles: [ backend, all ]
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: datapulse-celery-beat
    command: celery -A datapulse beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://datapulse:datapulse@db:5432/datapulse}  # pragma: allowlist secret
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-datapulse.settings.dev}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - ./backend:/app
      - upload_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - datapulse-network

  # -----------------------------------------------------------
  # Profile: etl
  # Run manually or on cron — exits when done
  # docker compose --profile etl run --rm etl
  # -----------------------------------------------------------
  etl:
    profiles: [ etl, all ]
    build:
      context: .
      dockerfile: devops/Dockerfile.pipeline
    container_name: datapulse-etl
    env_file: .env
    environment:
      SOURCE_DB_URL: ${DATABASE_URL:-postgresql://datapulse:datapulse@db:5432/datapulse}  # pragma: allowlist secret
      TARGET_DB_URL: ${TARGET_DB_URL:-postgresql://analytics:analytics@db-analytics:5432/datapulse_analytics}  # pragma: allowlist secret
    depends_on:
      db:
        condition: service_healthy
      db-analytics:
        condition: service_healthy
    restart: on-failure
    networks:
      - datapulse-network

  # -----------------------------------------------------------
  # Profile: db-seed
  # Initialization service to populate mock data on startup
  # -----------------------------------------------------------
  db-seed:
    profiles: [ backend, all ]
    build:
      context: .
      dockerfile: devops/Dockerfile.pipeline
    container_name: datapulse-db-seed
    env_file: .env
    environment:
      SOURCE_DB_URL: ${DATABASE_URL:-postgresql://datapulse:datapulse@db:5432/datapulse}  # pragma: allowlist secret
      TARGET_DB_URL: ${TARGET_DB_URL:-postgresql://analytics:analytics@db-analytics:5432/datapulse_analytics}  # pragma: allowlist secret
      PYTHONPATH: /pipeline
    command: python seed/seed_analytics.py
    depends_on:
      backend:
        condition: service_started
    networks:
      - datapulse-network

  # -----------------------------------------------------------
  # Profile: streamer
  # Continuous mock data generation
  # -----------------------------------------------------------
  streamer:
    profiles: [ backend, all ]
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: datapulse-streamer
    command: python manage.py stream_check_results --interval 10 --rows 5
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://datapulse:datapulse@db:5432/datapulse}  # pragma: allowlist secret
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-datapulse.settings.dev}
    volumes:
      - ./backend:/app
    depends_on:
      backend:
        condition: service_started
      db-seed:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - datapulse-network

  # -----------------------------------------------------------
  # Profile: frontend
  # Next.js app — reach backend at backend:8000 from SSR; browser uses NEXT_PUBLIC_API_URL
  # -----------------------------------------------------------
  frontend:
    profiles: [ frontend, all ]
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: datapulse-frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3001:3000"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped
    networks:
      - datapulse-network

  # -----------------------------------------------------------
  # Profile: streamlit
  # -----------------------------------------------------------
  streamlit:
    profiles: [ streamlit, all ]
    build:
      context: ./data-engineering
      dockerfile: Dockerfile
    container_name: datapulse-streamlit
    env_file: .env
    environment:
      TARGET_DB_URL: ${TARGET_DB_URL:-postgresql://analytics:analytics@db-analytics:5432/datapulse_analytics}  # pragma: allowlist secret
    ports:
      - "8501:8501"
    depends_on:
      db-analytics:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - datapulse-network

  # -----------------------------------------------------------
  # Profile: monitoring
  # Prometheus, Grafana, Loki, Promtail, Tempo
  # -----------------------------------------------------------
  prometheus:
    profiles: [ monitoring, all ]
    image: prom/prometheus:latest
    container_name: datapulse-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./devops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    restart: unless-stopped
    networks:
      - datapulse-network

  loki:
    profiles: [ monitoring, all ]
    image: grafana/loki:latest
    container_name: datapulse-loki
    ports:
      - "3100:3100"
    volumes:
      - ./devops/loki/loki-config.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    networks:
      - datapulse-network

  promtail:
    profiles: [ monitoring, all ]
    image: grafana/promtail:latest
    container_name: datapulse-promtail
    volumes:
      - ./devops/promtail/promtail-config.yml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    restart: unless-stopped
    networks:
      - datapulse-network

  tempo:
    profiles: [ monitoring, all ]
    image: grafana/tempo:latest
    container_name: datapulse-tempo
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./devops/tempo/tempo-config.yml:/etc/tempo.yaml
      - tempo_data:/loki
    command: -config.file=/etc/tempo.yaml
    restart: unless-stopped
    networks:
      - datapulse-network

  grafana:
    profiles: [ monitoring, all ]
    image: grafana/grafana:latest
    container_name: datapulse-grafana
    env_file: .env
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-datapulse123}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./devops/grafana/provisioning:/etc/grafana/provisioning
      - ./devops/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - datapulse-network

# =============================================================
# Volumes
# =============================================================
volumes:
  pgdata:
  pgdata_analytics:
  upload_data:
  prometheus_data:
  grafana_data:
  loki_data:
  tempo_data:

    # =============================================================
    # Networks
    # =============================================================
networks:
  datapulse-network:
    driver: bridge
